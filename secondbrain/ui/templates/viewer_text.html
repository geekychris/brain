{% extends "base.html" %}

<div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; white-space: pre-wrap; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85em; line-height: 1.6; max-height: 80vh; overflow-y: auto;">{{ content }}</div>
