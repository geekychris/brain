<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VaultForge{% endblock %}</title>
    <style>
        :root {
            --bg: #1a1b26;
            --bg-surface: #24283b;
            --bg-hover: #2f3347;
            --text: #c0caf5;
            --text-muted: #565f89;
            --accent: #7aa2f7;
            --accent-hover: #89b4fa;
            --green: #9ece6a;
            --yellow: #e0af68;
            --red: #f7768e;
            --purple: #bb9af7;
            --cyan: #7dcfff;
            --orange: #ff9e64;
            --border: #3b4261;
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        nav {
            width: 220px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        nav .logo {
            padding: 0 20px 20px;
            font-size: 1.3em;
            font-weight: 700;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            margin-bottom: 10px;
        }

        nav .logo span { color: var(--purple); }

        nav a {
            display: block;
            padding: 10px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95em;
            transition: all 0.15s;
        }

        nav a:hover, nav a.active {
            color: var(--text);
            background: var(--bg-hover);
        }

        nav a::before {
            margin-right: 8px;
            font-size: 1.1em;
        }

        main {
            flex: 1;
            margin-left: 220px;
            padding: 30px 40px;
            max-width: 1100px;
        }

        h1 { font-size: 1.8em; margin-bottom: 20px; font-weight: 600; }
        h2 { font-size: 1.3em; margin: 20px 0 10px; font-weight: 600; color: var(--accent); }
        h3 { font-size: 1.1em; margin: 15px 0 8px; font-weight: 600; }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .stat-card .value {
            font-size: 2em;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-card .label {
            color: var(--text-muted);
            font-size: 0.85em;
            margin-top: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-surface);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--bg-hover);
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr:hover td { background: var(--bg-hover); }
        tr:last-child td { border-bottom: none; }

        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .badge-source { background: #1a3a5c; color: var(--cyan); }
        .badge-concept { background: #2d1f54; color: var(--purple); }
        .badge-project { background: #1f3d1a; color: var(--green); }
        .badge-person { background: #3d2e1a; color: var(--orange); }
        .badge-decision { background: #3d1a1a; color: var(--red); }
        .badge-meeting { background: #1a3d3d; color: var(--cyan); }
        .badge-daily { background: #3d3d1a; color: var(--yellow); }
        .badge-map { background: #1a1f3d; color: var(--accent); }

        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 0.9em;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="text"], input[type="url"], textarea, select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.95em;
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(122, 162, 247, 0.15);
        }

        textarea { min-height: 120px; resize: vertical; }

        button, .btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: var(--radius);
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
        }

        button:hover, .btn:hover {
            background: var(--accent-hover);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn-outline:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .btn-green { background: var(--green); }
        .btn-yellow { background: var(--yellow); color: var(--bg); }

        .answer-box {
            background: var(--bg-surface);
            border: 1px solid var(--accent);
            border-radius: var(--radius);
            padding: 20px;
            margin: 20px 0;
        }

        .answer-box .answer-text {
            font-size: 1.05em;
            line-height: 1.7;
            margin-bottom: 15px;
        }

        .answer-meta {
            display: flex;
            gap: 15px;
            color: var(--text-muted);
            font-size: 0.85em;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            background: var(--bg-hover);
            border-radius: 4px;
            font-size: 0.8em;
            color: var(--cyan);
            margin: 2px;
        }

        .note-body {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 25px;
            white-space: pre-wrap;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.9em;
            line-height: 1.7;
        }

        .health-ok { color: var(--green); }
        .health-warn { color: var(--yellow); }
        .health-error { color: var(--red); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state h2 { color: var(--text-muted); }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .tab {
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 0.9em;
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: none;
        }

        .tab:hover, .tab.active {
            color: var(--text);
            background: var(--bg-hover);
            text-decoration: none;
        }

        .search-results { margin-top: 20px; }
        .search-result {
            padding: 12px;
            border-left: 3px solid var(--accent);
            margin-bottom: 10px;
            background: var(--bg-surface);
            border-radius: 0 var(--radius) var(--radius) 0;
        }
        .search-result .excerpt {
            color: var(--text-muted);
            font-size: 0.85em;
            margin-top: 5px;
        }
        .relevance {
            font-size: 0.8em;
            color: var(--green);
        }
    </style>
</head>
<body>
    <div class="layout">
        <nav>
            <div class="logo">Vault<span>Forge</span></div>
            <a href="/">Dashboard</a>
            <a href="/notes">Notes</a>
            <a href="/sources">Sources</a>
            <a href="/concepts">Concepts</a>
            <a href="/entities">Entities</a>
            <a href="/graph">Graph</a>
            <a href="/search">Search</a>
            <a href="/ingest">Ingest</a>
            <a href="/ask">Ask Vault</a>
            <a href="/log">Activity Log</a>
            <a href="/health">Health</a>
            <a href="/vaults">Vaults</a>
            <a href="/settings">Settings</a>
        </nav>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
