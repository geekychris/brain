{% extends "base.html" %}
{% block title %}{{ title }} — VaultForge{% endblock %}
{% block content %}
<h1>{{ title }}</h1>

{% include "partials/annotations.html" %}

<div style="background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; height: 80vh;">
    <iframe src="/raw/{{ file_path }}" width="100%" height="100%" style="border: none;"></iframe>
</div>

<div style="margin-top: 15px;">
    <a href="javascript:history.back()" class="btn btn-outline">Back</a>
    <a href="/raw/{{ file_path }}" class="btn btn-outline" target="_blank">Open in New Tab</a>
</div>
{% endblock %}
